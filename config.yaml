zooms: [6, 7, 8, 9, 10, 11, 12, 13, 14]

# Пиксельные допуски (теперь более агрессивные для средних зумов)
tolerances:
  lines:
    6: 8.0   # Очень сильное сглаживание
    10: 3.0  # Уберет мелкие извилины рек/дорог
    14: 0.1  # Почти без потерь
  polygons:
    6: 4.0
    10: 1.5
    14: 0.05

layers:
  natural: { min_zoom: 6 }
  water: { min_zoom: 6 }      # Для озер (natural=water)
  waterway: { min_zoom: 7 }   # Для рек (waterway=*)
  building: { min_zoom: 14 }

highways:
  motorway: { min_zoom: 6, priority: 1 }
  trunk: { min_zoom: 6, priority: 2 }
  primary: { min_zoom: 7, priority: 3 }
  secondary: { min_zoom: 9, priority: 4 }
  residential: { min_zoom: 12, priority: 5 }